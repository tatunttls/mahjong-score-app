<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>4人麻雀 成績記録</title>
  <link rel="icon" type="image/png" href="header-chu.png" />
  <link rel="apple-touch-icon" href="header-chu.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="fixed-head">
      <header class="topbar">
        <div class="title-area">
          <img class="title-logo" src="header-chu.png" alt="中" />
          <h1>4人麻雀 成績記録</h1>
        </div>
      </header>

      <nav class="tabs">
        <button id="tabInput" class="active" onclick="switchTab('input')">対局入力</button>
        <button id="tabDate" onclick="switchTab('date')">日付別成績</button>
        <button id="tabPersonal" onclick="switchTab('personal')">個人成績</button>
      </nav>
    </div>

    <main class="scroll-area" id="scrollArea">
      <section id="inputPanel" class="panel active">
        <div class="sheet-toolbar compact-card">
          <button class="add-game-button" onclick="addGameToSelectedDate()">対局追加</button>
          <label class="sheet-select-label">対局日
            <select id="dateSheetSelect" onchange="selectDateSheet(this.value)"></select>
          </label>
          <div class="new-date-wrap">
            <button class="new-date-button" onclick="openNewDatePicker()">新規対局日</button>
            <div id="newDateRow" class="new-date-row" hidden>
              <input id="newDatePicker" class="new-date-input" type="date" onchange="createDateSheet(this.value)" />
              <button type="button" class="date-create-button" onclick="createDateSheet(document.getElementById('newDatePicker').value)">作成</button>
              <button type="button" class="date-cancel-button" onclick="closeNewDatePicker()">閉じる</button>
            </div>
          </div>
        </div>
        <div id="games"></div>
      </section>

      <section id="datePanel" class="panel">
        <div id="dateSummary"></div>
      </section>

      <section id="personalPanel" class="panel">
        <div class="table-wrap compact-card">
          <table>
            <thead>
              <tr>
                <th>名前</th><th>回数</th><th>合計</th><th>平均</th>
                <th>1位</th><th>2位</th><th>3位</th><th>4位</th>
              </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
